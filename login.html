<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Kreddlo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:          '#0d2145',
            green:         '#2d8a5e',
            'green-light': '#3dbd7a',
            cream:         '#f8f9fb',
            border:        '#e2e8f0',
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          borderRadius: { pill: '50px' },
        },
      },
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8f9fb;
      color: #0d2145;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Full-page layout ── */
    .page-bg {
      min-height: 100vh;
      width: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 48px;
      overflow: hidden;
    }

    /* ── Blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glass card ── */
    .glass {
      background: linear-gradient(135deg, rgba(255,255,255,0.80) 0%, rgba(255,255,255,0.60) 100%);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.60);
      border-bottom-color: rgba(255,255,255,0.30);
      border-right-color:  rgba(255,255,255,0.30);
      border-radius: 24px;
      box-shadow:
        0 2px 0 0 rgba(255,255,255,0.90) inset,
        0 -1px 0 0 rgba(255,255,255,0.25) inset,
        0 12px 48px rgba(13,33,69,0.11),
        0 2px 4px rgba(13,33,69,0.06);
      position: relative;
      width: 100%;
      max-width: 460px;
    }
    .glass::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(160deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.00) 50%, rgba(255,255,255,0.10) 100%);
      pointer-events: none; z-index: 0;
    }
    .glass > * { position: relative; z-index: 1; }

    /* ── Primary button ── */
    .btn-primary {
      display: flex; align-items: center; justify-content: center;
      width: 100%;
      background: #0d2145; color: #fff;
      border-radius: 50px; padding: 14px 28px;
      font-weight: 600; font-size: 15px;
      border: 2px solid #0d2145; cursor: pointer;
      transition: background .2s, transform .15s;
      text-decoration: none; white-space: nowrap;
      letter-spacing: -0.1px;
    }
    .btn-primary:hover { background: #162f5e; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    /* ── Inputs ── */
    .field-group  { display: flex; flex-direction: column; gap: 6px; }
    .field-label  { font-size: 13px; font-weight: 600; color: #0d2145; letter-spacing: -0.1px; }

    .field-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      background: rgba(255,255,255,0.70);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 400; color: #0d2145;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
      -webkit-appearance: none; appearance: none;
    }
    .field-input::placeholder { color: rgba(13,33,69,0.30); }
    .field-input:focus {
      border-color: #2d8a5e;
      box-shadow: 0 0 0 3px rgba(45,138,94,0.12);
    }
    .field-input.error {
      border-color: #e53e3e;
      box-shadow: 0 0 0 3px rgba(229,62,62,0.10);
    }

    /* ── Password wrapper ── */
    .pw-wrapper { position: relative; }
    .pw-wrapper .field-input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0;
      color: rgba(13,33,69,0.35); display: flex; align-items: center;
      transition: color .15s;
    }
    .pw-toggle:hover { color: #0d2145; }

    /* ── Error banner ── */
    .form-error {
      background: rgba(229,62,62,0.08);
      border: 1px solid rgba(229,62,62,0.22);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; font-weight: 500; color: #c53030;
      display: none;
    }
    .form-error.visible { display: block; }

    /* ── Field hint ── */
    .field-hint { font-size: 12px; color: #e53e3e; font-weight: 500; display: none; }
    .field-hint.visible { display: block; }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(13,33,69,0.10), transparent);
    }

    /* ── Reset modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(13,33,69,0.35);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(13,33,69,0.18);
      transform: translateY(12px);
      transition: transform .2s;
    }
    .modal-overlay.open .modal-card { transform: translateY(0); }

    .modal-success {
      background: rgba(45,138,94,0.08);
      border: 1px solid rgba(45,138,94,0.22);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; font-weight: 500; color: #2d8a5e;
      display: none;
    }
    .modal-success.visible { display: block; }
    .modal-error {
      background: rgba(229,62,62,0.08);
      border: 1px solid rgba(229,62,62,0.22);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; font-weight: 500; color: #c53030;
      display: none;
    }
    /* ── Google Sign-In button ── */
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%;
      background: #fff;
      color: #0d2145;
      border: 1.5px solid #e2e8f0;
      border-radius: 50px;
      padding: 13px 24px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(13,33,69,0.07);
      transition: background .15s, border-color .15s, box-shadow .15s, transform .15s;
      letter-spacing: -0.1px;
      text-decoration: none;
      position: relative;
    }
    .btn-google:hover {
      background: #f8f9fb;
      border-color: #c8d0dc;
      box-shadow: 0 4px 16px rgba(13,33,69,0.11);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: translateY(0); }
    .btn-google:disabled { opacity: 0.60; cursor: not-allowed; transform: none; }
    .btn-google:focus-visible { outline: 2px solid #2d8a5e; outline-offset: 3px; }

    /* ── OR divider ── */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
    }
    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(13,33,69,0.12), transparent);
    }
    .or-divider span {
      font-size: 12px; font-weight: 600;
      color: rgba(13,33,69,0.38);
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* Google loading spinner (dark on white) */
    .spinner-dark {
      width: 18px; height: 18px;
      border: 2px solid rgba(13,33,69,0.18);
      border-top-color: #0d2145;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      flex-shrink: 0;
    }
  </style>

  <!-- Firebase CDN -->
  <script type="module">
    import { initializeApp }                                    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc }                        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword,
             sendPasswordResetEmail,
             GoogleAuthProvider, signInWithPopup }              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey:            "{{FIREBASE_API_KEY}}",
      authDomain:        "{{FIREBASE_AUTH_DOMAIN}}",
      projectId:         "{{FIREBASE_PROJECT_ID}}",
      storageBucket:     "{{FIREBASE_STORAGE_BUCKET}}",
      messagingSenderId: "{{FIREBASE_MESSAGING_SENDER_ID}}",
      appId:             "{{FIREBASE_APP_ID}}",
    };

    const app   = initializeApp(firebaseConfig);
    window.db   = getFirestore(app);
    window.auth = getAuth(app);
    window._fbReady = {
      signInWithEmailAndPassword,
      getDoc, doc,
      sendPasswordResetEmail,
      GoogleAuthProvider,
      signInWithPopup
    };
  </script>
</head>

<body>
  <div class="page-bg">

    <!-- Background blobs -->
    <div class="blob" style="width:480px;height:480px;background:radial-gradient(circle,rgba(45,138,94,0.10) 0%,transparent 70%);top:-140px;left:-160px;"></div>
    <div class="blob" style="width:400px;height:400px;background:radial-gradient(circle,rgba(13,33,69,0.07) 0%,transparent 70%);bottom:-80px;right:-100px;"></div>
    <div class="blob" style="width:280px;height:280px;background:radial-gradient(circle,rgba(61,189,122,0.07) 0%,transparent 70%);top:50%;right:10%;"></div>

    <!-- Logo -->
    <a href="index.html" class="relative z-10 mb-8 flex-shrink-0 mt-2">
      <img src="assets/kreddlo-logo.png" alt="Kreddlo" width="130"
           onerror="this.outerHTML='<span style=\'font-size:22px;font-weight:800;color:#0d2145;letter-spacing:-0.5px\'>Kredd<span style=\'color:#2d8a5e\'>lo</span></span>'" />
    </a>

    <!-- Card -->
    <div class="glass relative z-10 px-6 py-8 sm:px-8 sm:py-10">

      <!-- Heading -->
      <div class="text-center mb-7">
        <h1 class="text-[22px] sm:text-[26px] font-800 text-navy tracking-[-0.6px] mb-1.5">
          Welcome Back
        </h1>
        <p class="text-[14px] text-navy/50 font-400">
          Log in to your Kreddlo account.
        </p>
      </div>

      <div class="divider mb-6"></div>

      <!-- Error banner -->
      <div id="form-error" class="form-error mb-5" role="alert"></div>

      <!-- Google Sign-In -->
      <button id="google-btn" type="button" class="btn-google" onclick="signInWithGoogle()" aria-label="Continue with Google">
        <!-- Official Google G SVG mark -->
        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        <span id="google-label">Continue with Google</span>
      </button>

      <!-- OR divider -->
      <div class="or-divider">
        <span>or</span>
      </div>

      <!-- Form -->
      <form id="login-form" novalidate autocomplete="on">

        <!-- Email -->
        <div class="field-group mb-4">
          <label class="field-label" for="email">Email Address</label>
          <input
            id="email"
            type="email"
            class="field-input"
            placeholder="you@example.com"
            autocomplete="email"
            inputmode="email"
          />
          <span id="hint-email" class="field-hint">Please enter a valid email address.</span>
        </div>

        <!-- Password -->
        <div class="field-group mb-2">
          <label class="field-label" for="password">Password</label>
          <div class="pw-wrapper">
            <input
              id="password"
              type="password"
              class="field-input"
              placeholder="Your password"
              autocomplete="current-password"
            />
            <button type="button" class="pw-toggle" aria-label="Show password" onclick="togglePw(this)">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span id="hint-password" class="field-hint">Please enter your password.</span>
        </div>

        <!-- Forgot password -->
        <div class="flex justify-end mb-6">
          <button type="button" onclick="openReset()"
                  class="text-[13px] font-600 text-green hover:underline bg-transparent border-none cursor-pointer p-0">
            Forgot Password?
          </button>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="btn-primary">
          <span id="btn-label">Log In</span>
        </button>

      </form>

      <!-- Sign up link -->
      <p class="text-center text-[14px] text-navy/50 font-400 mt-5">
        New to Kreddlo?
        <a href="signup.html" class="font-600 text-green hover:underline ml-1">Sign Up</a>
      </p>

    </div>

    <div class="h-12 relative z-10"></div>

  </div><!-- /page-bg -->


  <!-- ══ FORGOT PASSWORD MODAL ══ -->
  <div id="reset-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">

      <div class="flex items-center justify-between mb-5">
        <h2 id="modal-title" class="text-[18px] font-800 text-navy tracking-[-0.4px]">Reset Your Password</h2>
        <button onclick="closeReset()" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors border-none bg-transparent cursor-pointer" aria-label="Close">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#0d2145" stroke-width="2.5">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <p class="text-[14px] text-navy/55 font-400 leading-relaxed mb-5">
        Enter the email address on your account and we will send you a link to reset your password.
      </p>

      <div id="modal-error"   class="modal-error   mb-4"></div>
      <div id="modal-success" class="modal-success mb-4"></div>

      <div class="field-group mb-4">
        <label class="field-label" for="reset-email">Email Address</label>
        <input
          id="reset-email"
          type="email"
          class="field-input"
          placeholder="you@example.com"
          inputmode="email"
          autocomplete="email"
        />
      </div>

      <button id="reset-btn" onclick="sendReset()"
              class="btn-primary" style="border-radius:50px;">
        <span id="reset-label">Send Reset Link</span>
      </button>

    </div>
  </div>


  <script>
    /* ── Password toggle ── */
    function togglePw(btn) {
      const input  = document.getElementById('password');
      const isText = input.type === 'text';
      input.type   = isText ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      btn.setAttribute('aria-label', isText ? 'Show password' : 'Hide password');
    }

    /* ── Field helpers ── */
    function markField(id, error) { document.getElementById(id).classList.toggle('error', error); }
    function showHint(id, show)   { document.getElementById(id).classList.toggle('visible', show); }

    function showError(msg) {
      const el = document.getElementById('form-error');
      el.textContent = msg; el.classList.add('visible');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function clearError() {
      const el = document.getElementById('form-error');
      el.textContent = ''; el.classList.remove('visible');
    }

    function setLoading(loading) {
      const btn   = document.getElementById('submit-btn');
      const label = document.getElementById('btn-label');
      btn.disabled = loading;
      label.innerHTML = loading
        ? '<span class="spinner mr-2"></span> Logging In...'
        : 'Log In';
    }

    /* ── Firebase error messages ── */
    function firebaseMsg(code) {
      const map = {
        'auth/user-not-found':          'No account found with this email address.',
        'auth/wrong-password':          'Incorrect password. Please try again.',
        'auth/invalid-credential':      'Incorrect email or password. Please try again.',
        'auth/invalid-email':           'The email address is not valid.',
        'auth/user-disabled':           'This account has been disabled. Contact support.',
        'auth/too-many-requests':       'Too many failed attempts. Please wait a moment and try again.',
        'auth/network-request-failed':  'Network error. Check your connection and try again.',
        'auth/popup-closed-by-user':    'Sign-in cancelled. The Google window was closed.',
        'auth/popup-blocked':           'Your browser blocked the sign-in popup. Allow popups for this site and try again.',
        'auth/cancelled-popup-request': null,   // silent — user opened popup twice
        'auth/account-exists-with-different-credential': 'An account already exists with this email using a different sign-in method. Try logging in with your email and password.',
      };
      return map[code] !== undefined ? map[code] : 'Something went wrong. Please try again.';
    }

    /* ── Google Sign-In ── */
    function setGoogleLoading(loading) {
      const btn   = document.getElementById('google-btn');
      const label = document.getElementById('google-label');
      btn.disabled = loading;
      label.innerHTML = loading
        ? '<span class="spinner-dark"></span>&nbsp;Connecting...'
        : 'Continue with Google';
    }

    async function signInWithGoogle() {
      clearError();
      const ready = await waitForFirebase();
      if (!ready) { showError('Firebase failed to load. Please refresh and try again.'); return; }

      const { GoogleAuthProvider, signInWithPopup, getDoc, doc } = window._fbReady;

      setGoogleLoading(true);

      try {
        const provider   = new GoogleAuthProvider();
        // Force account picker every time so users can switch accounts
        provider.setCustomParameters({ prompt: 'select_account' });

        const credential = await signInWithPopup(window.auth, provider);
        const uid        = credential.user.uid;

        // Check if Firestore user document already exists
        const snap = await getDoc(doc(window.db, 'users', uid));

        if (snap.exists()) {
          // Returning user — route based on their role and KYC status
          redirect(snap.data());
        } else {
          // New user via Google — they need to choose a role before anything else.
          // Pass the Google display name and email as URL params so signup.html
          // can pre-fill the form without asking for them again.
          const user   = credential.user;
          const params = new URLSearchParams({
            step:  'role',
            name:  user.displayName || '',
            email: user.email       || '',
            uid:   uid,
          });
          window.location.href = 'signup.html?' + params.toString();
        }

      } catch (err) {
        setGoogleLoading(false);
        const msg = firebaseMsg(err.code);
        // Silent errors (e.g. cancelled popup request) — do nothing
        if (msg !== null) showError(msg);
      }
    }

    /* ── Form submit ── */
    async function waitForFirebase() {
      const start = Date.now();
      while (!window._fbReady && Date.now() - start < 8000) {
        await new Promise(r => setTimeout(r, 80));
      }
      return !!window._fbReady;
    }

    /* ── Role-based redirect ── */
    function redirect(userData) {
      if (userData.role === 'admin') {
        window.location.href = 'admin.html';
      } else if (userData.kycStatus !== 'verified') {
        window.location.href = 'verify.html';
      } else if (userData.role === 'freelancer') {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'buyer-dashboard.html';
      }
    }

    /* ── Form submit ── */
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearError();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      /* Reset field states */
      ['email', 'password'].forEach(id => markField(id, false));
      ['hint-email', 'hint-password'].forEach(id => showHint(id, false));

      /* Validate */
      let valid = true;
      const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!email || !emailRx.test(email)) {
        markField('email', true); showHint('hint-email', true); valid = false;
      }
      if (!password) {
        markField('password', true); showHint('hint-password', true); valid = false;
      }
      if (!valid) return;

      const ready = await waitForFirebase();
      if (!ready) { showError('Firebase failed to load. Please refresh and try again.'); return; }

      const { signInWithEmailAndPassword, getDoc, doc } = window._fbReady;

      setLoading(true);

      try {
        const credential = await signInWithEmailAndPassword(window.auth, email, password);
        const uid        = credential.user.uid;

        /* Fetch Firestore user document */
        const snap = await getDoc(doc(window.db, 'users', uid));

        if (!snap.exists()) {
          /* Document missing — redirect to verify as safe fallback */
          window.location.href = 'verify.html';
          return;
        }

        redirect(snap.data());

      } catch (err) {
        setLoading(false);
        showError(firebaseMsg(err.code));
      }
    });


    /* ══ FORGOT PASSWORD MODAL ══ */

    function openReset() {
      const email = document.getElementById('email').value.trim();
      if (email) document.getElementById('reset-email').value = email;
      clearModalMessages();
      document.getElementById('reset-modal').classList.add('open');
      setTimeout(() => document.getElementById('reset-email').focus(), 150);
    }

    function closeReset() {
      document.getElementById('reset-modal').classList.remove('open');
    }

    /* Close on overlay click */
    document.getElementById('reset-modal').addEventListener('click', function(e) {
      if (e.target === this) closeReset();
    });

    /* Close on Escape */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeReset();
    });

    function clearModalMessages() {
      ['modal-error', 'modal-success'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = ''; el.classList.remove('visible');
      });
    }

    function setResetLoading(loading) {
      const btn   = document.getElementById('reset-btn');
      const label = document.getElementById('reset-label');
      btn.disabled = loading;
      label.innerHTML = loading
        ? '<span class="spinner mr-2"></span> Sending...'
        : 'Send Reset Link';
    }

    async function sendReset() {
      clearModalMessages();

      const email = document.getElementById('reset-email').value.trim();
      const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!email || !emailRx.test(email)) {
        const el = document.getElementById('modal-error');
        el.textContent = 'Please enter a valid email address.';
        el.classList.add('visible');
        return;
      }

      const ready = await waitForFirebase();
      if (!ready) {
        const el = document.getElementById('modal-error');
        el.textContent = 'Firebase failed to load. Please refresh.';
        el.classList.add('visible');
        return;
      }

      const { sendPasswordResetEmail } = window._fbReady;
      setResetLoading(true);

      try {
        await sendPasswordResetEmail(window.auth, email);
        const el = document.getElementById('modal-success');
        el.textContent = 'Reset link sent. Check your inbox and spam folder.';
        el.classList.add('visible');
        setResetLoading(false);

        /* Auto-close after 3 seconds */
        setTimeout(closeReset, 3000);

      } catch (err) {
        setResetLoading(false);
        const el = document.getElementById('modal-error');
        el.textContent = err.code === 'auth/user-not-found'
          ? 'No account found with this email address.'
          : 'Could not send reset email. Please try again.';
        el.classList.add('visible');
      }
    }
  </script>
